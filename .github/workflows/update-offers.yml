name: Update offers

on:
  schedule:
    - cron: "15 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-offers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh live offers
        run: npm run update:offers:refresh

      - name: Typecheck
        run: npm run typecheck

      - name: Keep generated TypeScript cache out of commits
        run: git checkout -- tsconfig.tsbuildinfo

      - name: Commit refreshed data
        run: |
          if git diff --quiet -- data/generated-offers.json data/source-cache.json; then
            echo "No offer changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/generated-offers.json data/source-cache.json
          git commit -m "Update product offers"
          git push
